<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아이디찾기</title>
  </head>
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 80vh;
      justify-content: center;
      align-items: center;
    }
    .main {
      /* border: solid 1px #000; */
      padding: 100px 180px;
    }

    .tap {
      margin: 10px 0px;
      display: flex;
      justify-content: center;
    }

    .tap:first-child {
      margin-bottom: 50px;
      font-size: 25px;
      font-weight: bold;
      color: gray;
    }

    .pwfinder .cancel {
      padding: 10px 15px;
    }
    .tap:last-child {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .tap:nth-child(2),
    .tap:nth-child(3) {
      gap: 30px;
    }
    .main-tap {
      width: 400px;
    }
    button {
      border: solid 0.5px gray;
      border-radius: 4px;
      background-color: whitesmoke;
      font-weight: bold;
      padding: 2.5px 20px;
    }
    input {
      display: flex;
      justify-content: center;
      border-radius: 0px;
      border: 1px solid black;
    }
  </style>
  <body>
    <div class="main">
      <div class="main-tap">
        <div class="tap">
          <div>아이디 찾기</div>
        </div>
        <div class="tap">
          <div class="name">이름</div>
          <input type="text" placeholder="이름 입력" />
        </div>
        <div class="tap">
          <div class="email">이메일</div>
          <input type="text" placeholder=" 이메일 입력" />
        </div>
        <div class="tap">
          <button class="pwfinder">아이디 찾기</button>
          <button class="cancel">취소</button>
        </div>
      </div>
    </div>
  </body>
</html>
