<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
  </head>
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 80vh;
      justify-content: center;
      align-items: center;
      width: 100%;
    }
    .main {
      /* border: solid 1px #000; */
      padding: 100px 180px;
    }

    .tap {
      width: 300px;
      margin: 10px 0px;
      display: flex;
      justify-content: space-between;
    }

    .tap:first-child {
      justify-content: center;
      margin-bottom: 50px;
      font-size: 25px;
      font-weight: bold;
      color: gray;
    }

    .pwfinder .cancel {
      padding: 10px 15px;
    }

    .tap:last-child {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .tap:nth-child(2),
    .tap:nth-child(3),
    .tap:nth-child(4),
    .tap:nth-child(5),
    .tap:nth-child(6) {
      gap: 30px;
    }
    .main-tap {
      width: 400px;
    }
    button {
      border: solid 0.5px gray;
      border-radius: 4px;
      background-color: whitesmoke;
      font-weight: bold;
      padding: 2.5px 20px;
    }
    input {
      display: flex;
      justify-content: center;
      border-radius: 0px;
      border: 1px solid black;
    }
  </style>
  <body>
    <div class="main">
      <div class="main-tap">
        <div class="tap">
          <div>회원가입</div>
        </div>
        <div class="tap">
          <div class="id">이름</div>
          <input type="text" placeholder=" 이름을 입력하세요" />
        </div>
        <div class="tap">
          <div class="email">아이디</div>
          <input type="text" placeholder=" 아이디를 입력하세요" />
        </div>
        <div class="tap">
          <div class="email">비밀번호</div>
          <input type="password" placeholder=" 비밀번호를 입력하세요" />
        </div>
        <div class="tap">
          <div class="email">비밀번호 확인</div>
          <input type="password" placeholder=" 비밀번호를 다시 입력하세요" />
        </div>
        <div class="tap">
          <div class="email">이메일</div>
          <input type="email" placeholder=" 이메일을 입력하세요" />
        </div>
        <div class="tap">
          <button
            class="pwfinder"
            onclick="location.href='/html/main_login.html'"
          >
            회원가입 완료
          </button>
          <button class="cancel" onClick="location.href='/index.html'">
            취소
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
