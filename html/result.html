<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>투표 결과</title>
    <link
      rel="stylesheet"
      href="https://fontawesome.com/icons/clock?f=classic&s=light"
    />
    <style>
      /* 필요한 CSS 스타일을 추가합니다. */
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 100%;
      }
      body > div {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        box-shadow: 3px 3px;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: center;
      }

      .container {
        display: flex;
        flex-direction: column;
      }

      .box {
        width: 80px; /* 박스의 가로 길이 */
        height: 30px; /* 박스의 세로 길이 */
        border: 1px solid black; /* 박스 테두리 */
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: space-evenly;
      }

      .photo {
        margin-top: 10px;
        margin-left: 10px;
        height: 150px;
        width: 250px;
      }

      .back {
        background-color: #dbdbdb;
        width: 100%;
        height: 20px;
      }

      .ground {
        background-color: #4caf50;
        width: 70%;
        height: 100%;
      }

      .last {
        display: flex;
        align-items: end;
        justify-content: flex-end;
        margin-bottom: 5px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        width: 100%;
        margin-bottom: 5px;
      }

      .text {
        width: 50px;
      }

      .picture {
        width: 100px;
      }

      .title {
        display: flex;
        justify-content: center;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-..."
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div>
      <h1 class="title">투표 결과</h1>
      <div class="top">
        <!--백앤드 작업 필요-->
        <!-- 타이머, 이전결과 -->

        <div class="box">
          <i class="fa fa-clock"></i>
          <div>D-0</div>
        </div>
        <div class="last">[이전 결과] 상품명 > 상품명 > 상품명 > 상품명</div>
      </div>

      <!-- 투표 결과 표 -->
      <table>
        <thead>
          <tr>
            <th style="width: 100px">이미지</th>
            <th style="width: 50px">이름</th>
            <th style="width: 300px">비율</th>
            <th style="width: 50px">순위</th>
          </tr>
          <tr>
            <td class="picture">
              <img class="photo" src="/images/육개장.png" />
            </td>
            <td class="text">육개장</td>
            <td>
              <div class="back">
                <div class="ground"></div>
              </div>
            </td>
            <td class="text">1</td>
          </tr>

          <tr>
            <td class="picture">
              <img class="photo" src="/images/몽쉘.png" />
            </td>
            <td class="text">몽쉘</td>
            <td>
              <div class="back">
                <div class="ground"></div>
              </div>
            </td>
            <td class="text">2</td>
          </tr>

          <tr>
            <td class="picture">
              <img class="photo" src="/images/몬스터.png" />
            </td>
            <td class="text">몬스터</td>
            <td>
              <div class="back">
                <div class="ground"></div>
              </div>
            </td>
            <td class="text">3</td>
          </tr>
        </thead>
      </table>
    </div>
  </body>
</html>
