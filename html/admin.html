  <body>
    <div class="nav">
      <div class="nav_logo">

          ></i>

    <div class="main">

        <button data-page="admin1.html">투표 설정</button>
        <button data-page="admin2.html">회원관리</button>
        <button data-page="admin3.html">투표</button>
      </div>
      <div class="screen">
        <iframe src="admin1.html" id="contentFrame"></iframe>
      </div>
    </div>
    <script>
      const buttons = document.querySelectorAll('.select button');
      const contentFrame = document.getElementById('contentFrame');

      buttons.forEach((button) => {
        button.addEventListener('click', () => {
          const page = button.getAttribute('data-page');
          contentFrame.src = page;
        });
      });
    </script>
