<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>마이페이지</title>
  <style>
    body {
      width: 100%;
      display:flex;
      margin: 0;
      font-family: sans-serif;
      background-color: white;
      flex-direction: column;
      align-items: center;
    }

    /* 상단 로고 헤더 자리 */
    #header {
      height: 60px;
      border-bottom: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    /* 와일드카드 배너 */
    #banner {
      background-color: #666;
      color: white;
      font-size: 24px;
      padding: 10px 0;
      text-align: center;
    }
    #banner span {
      color: yellow;
      font-weight: bold;
    }

    /* 전체 레이아웃 */
    #container {
      display: flex;
      width: 1440px;
    }

    /* 왼쪽 사이드바 */
    #sidebar {
        padding: 30px;
        margin:10px;
        width: 180px;
        height: 200px;
        background-color: #E6E6E6;
        padding-top: 20px;
        border-radius: 20px;
    }

    hr{
        border : 0px;
        border-top : 1px solid black;
    }

    #sidebar h3 {
      text-align: center;
      margin-bottom: 20px;
    }

    #sidebar ul {
      list-style: none;
      padding: 0;
    }

    #sidebar li {
      padding: 10px 20px;
      cursor: pointer;
    }

    #sidebar .active {
      background-color: gray;
      color: white;
      font-weight: bold;
    }

    /* 오른쪽 콘텐츠 영역 */
    #main {
      flex: 1;
      max-width: 1440px;
      /* background-color: #E6E6E6; */
      /* padding: 40px; */
      border-radius: 20px;
      margin:10px ;
    }
    #main #banner {
        border-radius: 20px;
    }

    #underbanner{
        background-color:#E6E6E6;
        border-radius: 20px;
        padding:10px 20px;
    }

    .profile-section{
        margin:20px;
        
    }

    .profile-section h3{
        text-align: left;
    }
    .profile-section {
      text-align: center;
    }

    .profile-section img {
      width: 100px;
      height: 100px;
      border: 1px solid #ccc;
    }

    .form-table {
      margin: 30px auto 0;
      width: 400px;
    }

    .form-table td:first-child {
    white-space: nowrap; /* 줄바꿈 방지 */
    width: 120px;         /* 최소 너비 설정 (필요시 더 늘려도 됨) */
    }

    .form-table td {
      padding: 10px;
    }

    .form-table input {
      padding: 5px;
      width: 200px;
    }

    .form-table button {
      padding: 5px 10px;
      white-space:nowrap;
    }

    .button-area {
      text-align: center;
      margin: 30px;
    }

    .button-area button {
      padding: 10px 20px;
      margin: 0 10px;
    }

    /* 투표 박스 스타일 */
    .vote-boxes {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .vote-box {
      border: 1px solid #ccc;
      padding: 10px;
      width: 120px;
      text-align: center;
    }

    .vote-box.selected {
      border: 3px solid black;
    }

    .vote-box img {
      width: 100px;
      height: 100px;
    }

    small {
      font-size: 12px;
      color: gray;
    }
    .contentss{
        background-color: #3d2b94;
    }





.vote {
  margin-top: 40px;
  padding: 20px;
  /* background-color: #fdfdfd; */
  text-align: center;
}

.vote-header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 20px;
}

.select-box {
  display: flex;
  align-items: center;
  font-size: 16px;
  margin-left: 20px;
}

.select-box button {
  padding: 5px 10px;
  margin-right: 5px;
}

.select-count {
  background-color: yellow;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.item-list {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.item {
  width: 150px;
  /* background-color: white; */
}

.item-box {
  width: 100%;
  height: 150px;
  border: 1px solid #ccc;
  position: relative;
}

.item-box::after {
  content: "❤";
  position: absolute;
  bottom: 5px;
  right: 5px;
  font-size: 16px;
  color: black;
}

.item-name {
  margin-top: 8px;
  font-weight: bold;
}

.item-tags {
  font-size: 12px;
  color: #444;
}




  </style>
</head>
<body>

  <!-- 상단 로고 영역 -->
  <!-- <div id="header">Logo</div> -->



  <!-- 전체 레이아웃 -->
  <div id="container">

    <!-- 왼쪽 메뉴 -->
    <div id="sidebar">
      <h3>마이페이지</h3>
      <hr>
      <ul>
        <li id="menu-info" class="active" onclick="showInfo()">내 정보</li>
        <li id="menu-items" onclick="showItems()">내 항목</li>
      </ul>
    </div>

    <!-- 오른쪽 콘텐츠 -->
    <div id="main">
      <!-- 기본으로 '내 정보' 화면 보여주기 -->
    </div>
  </div>

  <!-- JS: 화면 전환 -->
  <script>
    // 메뉴 클릭 시 class 처리
    function setActiveMenu(id) {
      document.getElementById('menu-info').classList.remove('active');
      document.getElementById('menu-items').classList.remove('active');
      document.getElementById(id).classList.add('active');
    }

    // 내 정보 화면
    function showInfo() {
      setActiveMenu('menu-info');
      document.getElementById('main').innerHTML = `
         <!-- 기본으로 '내 정보' 화면 보여주기 -->
      <div id="banner">🍀 <span>와일드카드</span> 대상입니다! 🍀</div>
    
    
      <div id="underbanner">
        <div class="profile-section">
            <h3>내 정보</h3>
            <hr>
              <img src="/images/profile.jpg" alt="profile">
          </div>
          
          <table class="form-table">
              <tr>
                  <td>이름</td>
                  <td>
                      <input type="text" placeholder="Name">
                  </td>
                  <td>
                      <button>변경</button>
                  </td>
              </tr>
              <tr>
                  <td>아이디</td>
                  <td colspan="2"><input type="text" placeholder="ID"></td>
              </tr>
              <tr>
                  <td>비밀번호 변경</td>
                  <td colspan="2"><input type="password" placeholder="Password"></td>
              </tr>
              <tr>
                  <td>비밀번호 재확인</td>
                  <td><input type="password" placeholder="Password"></td>
                  <td><button>변경</button></td>
              </tr>
          </table>
          <div class="button-area">
              <button>저장</button>
              <button>취소</button>
          </div>
      </div>
      `;
    }

    // 내 항목 화면
    function showItems() {
      setActiveMenu('menu-items');
      document.getElementById('main').innerHTML = `
              <!-- 기본으로 '내 정보' 화면 보여주기 -->
      <div id="banner">🍀 <span>와일드카드</span> 대상입니다! 🍀</div>
    
    
      <div id="underbanner">
        <div class="profile-section">
            <h3>내 항목</h3>
            <hr>
              <img src="/images/profile.jpg" alt="profile">
        </div>
        <!-- <div class="vote">
            <p>내 투표 현황<button>선택</button></p>


        </div> -->
        <div class="vote">
            <div class="vote-header">
              <span>내 투표 현황</span>
              <div class="select-box">
                <button>선택</button>

              </div>
            </div>
          
            <div class="item-list">
              <div class="item">
                <div class="item-box"></div>
                <div class="item-name">몬스터</div>
                <div class="item-tags">#과자 #음료</div>
              </div>
              <div class="item">
                <div class="item-box"></div>
                <div class="item-name">육개장</div>
                <div class="item-tags">#과자 #음료</div>
              </div>
              <div class="item">
                <div class="item-box"></div>
                <div class="item-name">몽쉘</div>
                <div class="item-tags">#과자 #음료</div>
              </div>
            </div>
          </div>
        <div class="zzim">
            <div class="vote-header">
                <span>찜 목록</span>

              </div>
            
              <div class="item-list">
                <div class="item">
                  <div class="item-box"><input type="checkbox" checked></div>
                  <div class="item-name">몬스터</div>
                  <div class="item-tags">#과자 #음료</div>
                </div>
                <div class="item">
                  <div class="item-box"><input type="checkbox" ></div>
                  <div class="item-name">육개장</div>
                  <div class="item-tags">#과자 #음료</div>
                </div>
                <div class="item">
                  <div class="item-box"><input type="checkbox" ></div>
                  <div class="item-name">몽쉘</div>
                  <div class="item-tags">#과자 #음료</div>
                </div>

                

              </div>

              <div class="button-area">
                <button>삭제</button>
                <button>변경</button>
            </div>
            </div>

        </div>
      `;
    }

    // 페이지 로드 시 기본값: 내 정보
    window.onload = showInfo;
  </script>
</body>
</html>
