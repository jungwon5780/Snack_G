<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>마이페이지</title>
  <style>
    body {
      display: flex;
      justify-content: center;
    }

    .sidebanner_tab .active {
      background-color: gray;
      color: white;
      font-weight: bold;
    }

    .page {
      display: flex;
      justify-content: center;
      width: 1440px;
    }

    hr {
      border: 0;
      border-top: 1px solid black;
    }

    .sidebanner {
      background-color: #E6E6E6;
      padding: 20px;
      margin: 10px;
      border-radius: 20px;
      width: 100px;
      height: 150px;
    }

    .sidebanner > :first-of-type {
      font-weight: bold;
    }

    .main {
      width: 800px;
      margin: 10px;
    }

    .banner {
      background-color: #666;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      font-size: 25px;
    }

    .banner span {
      color: yellow;
      font-weight: bold;
    }

    .container {
      display: flex;
      flex-direction: column;
      background-color: #E6E6E6;
      padding: 20px;
      align-items: center;
      border-radius: 20px;
      text-align: center;
    }

    .container_head p {
      text-align: left;
      font-weight: bold;
    }

    .container_head {
      width: 100%;
      align-self: flex-start;
      border-bottom: 1px solid black;
    }

    .frame {
      margin: 10px 0 0 0;
    }

    .element {
      display: flex;
      justify-content: space-between;
      width: 300px;
    }

    .button {
      display: flex;
      justify-content: space-between;
      width: 50%;
      margin: 10px 0;
    }

    .button:last-child {
      justify-content: space-evenly;
    }

    .vote {
      width: 100%;
    }

    .vote_button {
      width: 80%;
      height: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ✅ 공통 카드 컨테이너 스타일 */
    .card_container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      width: 80%;
      justify-content: center;
    }

    .vote_container {
      width: calc(100% / 3 - 10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      border-radius:10px;
    }
    .vote_container:hover {
        background-color: #666;
    }

    .vote_explain {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .vote_explain > div:last-child {
      color: blue;
      font-size: 10px;
    }

    .zzim {
      text-align: left;
      width: 100%;
    }

    .zzim_button {
      display: flex;
      width: 60%;
      justify-content: end;
      gap: 10px;
    }

    .vote_frame {
      position:relative;
      width: 90%;
      aspect-ratio: 1/1;
      overflow: hidden;
      border-radius: 10px;
      margin: 5px 0 0 0;
    }

    .vote_frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .heart-btn {
    position: absolute;
    bottom: 5px;
    right: 5px;
    font-size: 20px;
    color: black;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s ease;
    text-shadow: 0 0 10px white, 0 0 20px white;
    }

  </style>
</head>
<body>
  <div class="page">
    <div class="sidebanner">
      <div class="sidebanner_head">
        <p>마이페이지</p>
      </div>
      <hr>
      <div class="sidebanner_tab">
        <p id="menu-info" class="active" onclick="showInfo()">내 정보</p>
      </div>
      <div class="sidebanner_tab">
        <p id="menu-items" onclick="showItems()">내 항목</p>
      </div>
    </div>

    <div id="main" class="main"></div>
  </div>

  <script>
    function setActiveMenu(id) {
      document.getElementById('menu-info').classList.remove('active');
      document.getElementById('menu-items').classList.remove('active');
      document.getElementById(id).classList.add('active');
    }

    function showInfo() {
      setActiveMenu('menu-info');
      document.getElementById('main').innerHTML = `
        <div class="banner">
          🍀 <span>와일드카드</span> 대상입니다! 🍀
        </div>
        <div class="container">
          <div class="container_head"><p>내 정보</p></div>
          <div class="frame">
            <img src="../images/profile.jpg" alt="프로필사진">
          </div>
          <div class="button">
            <div class="element">
              <label for="userName">이름</label>
              <input type="text" id="userName" placeholder="Name" required>
            </div>
            <button>변경</button>
          </div>
          <div class="button">
            <div class="element">
              <label for="userID">아이디</label>
              <input type="text" id="userID" placeholder="ID" required>
            </div>
          </div>
          <div class="button">
            <div class="element">
              <label for="password">비밀번호</label>
              <input type="text" id="password" placeholder="Password" required>
            </div>
          </div>
          <div class="button">
            <div class="element">
              <label for="passwordAgain">비밀번호 재확인</label>
              <input type="text" id="passwordAgain" placeholder="Password" required>
            </div>
            <button>확인</button>
          </div>
          <div class="button">
            <button>저장</button>
            <button>취소</button>
          </div>
        </div>
      `;
    }

    function showItems() {
      setActiveMenu('menu-items');
      document.getElementById('main').innerHTML = `
        <div class="banner">
          🍀 <span>와일드카드</span> 대상입니다! 🍀
        </div>
        <div class="container">
          <div class="container_head"><p>내 정보</p></div>
          <div class="frame">
            <img src="../images/profile.jpg" alt="프로필사진">
          </div>
          <div class="vote">
            <div class="vote_button">
              <p>내 투표 현황</p>
              <button>선택</button>
            </div>
          </div>

          <!-- 투표 현황 카드 -->
          <div class="card_container">
            ${makeVoteCard("몬스터")}
            ${makeVoteCard("육개장")}
            ${makeVoteCard("몽쉘")}
          </div>

          <div class="zzim">
            <p>찜목록</p>
          </div>

          <!-- 찜 목록 카드 (같은 스타일) -->
          <div class="card_container">
            ${makeVoteCard("몬스터")}
            ${makeVoteCard("육개장")}
            ${makeVoteCard("초콜릿1")}
            ${makeVoteCard("초콜릿2")}
            ${makeVoteCard("초콜릿3")}
            ${makeVoteCard("초콜릿4")}
            ${makeVoteCard("홈런볼")}
          </div>

          <div class="zzim_button">
            <button>삭제</button>
            <button>변경</button>
          </div>
        </div>
      `;
    }

    function makeVoteCard(name) {
      return `
        <div class="vote_container">
          <div class="vote_frame">
            <img src="../images/${name}.png" alt="${name}">
            <div class="heart-btn" onclick="toggleHeart(this)">♡</div>
          </div>
          <div class="vote_explain">
            <div class="vote_product_name"><p>${name}</p></div>
            <div class="vote_product_explain"><p>#과자 #음료</p></div>
          </div>
        </div>
      `;
    }
    function toggleHeart(el) {
        el.textContent = el.textContent === "♡" ? "♥" : "♡";
    }

    window.onload = showInfo;
  </script>
</body>
</html>
