<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>마이페이지</title>
  <link rel="stylesheet" href="../css/mypage.css">
</head>
<body>
  <div class="page">
    <div class="sidebanner">
      <div class="sidebanner_head">
        <p>마이페이지</p>
      </div>
      <hr>
      <div class="sidebanner_tab">
        <p id="menu-info" class="active" onclick="showInfo()">내 정보</p>
      </div>
      <div class="sidebanner_tab">
        <p id="menu-items" onclick="showItems()">내 항목</p>
      </div>
    </div>

    <div id="main" class="main"></div>
  </div>

  <script>
    function setActiveMenu(id) {
      document.getElementById('menu-info').classList.remove('active');
      document.getElementById('menu-items').classList.remove('active');
      document.getElementById(id).classList.add('active');
    }

    function showInfo() {
      setActiveMenu('menu-info');
      document.getElementById('main').innerHTML = `
        <div class="banner">
          🍀 <span>와일드카드</span> 대상입니다! 🍀
        </div>
        <div class="container">
          <div class="container_head"><p>내 정보</p></div>
          <div class="frame">
            <img src="../images/profile.jpg" alt="프로필사진">
          </div>
          <div class="button">
            <div class="element">
              <label for="userName">이름</label>
              <input type="text" id="userName" placeholder="Name" required>
            </div>
            <button>변경</button>
          </div>
          <div class="button">
            <div class="element">
              <label for="userID">아이디</label>
              <input type="text" id="userID" placeholder="ID" required>
            </div>
          </div>
          <div class="button">
            <div class="element">
              <label for="password">비밀번호</label>
              <input type="text" id="password" placeholder="Password" required>
            </div>
          </div>
          <div class="button">
            <div class="element">
              <label for="passwordAgain">비밀번호 재확인</label>
              <input type="text" id="passwordAgain" placeholder="Password" required>
            </div>
            <button>확인</button>
          </div>
          <div class="button">
            <button>저장</button>
            <button>취소</button>
          </div>
        </div>
      `;
    }

    function showItems() {
      setActiveMenu('menu-items');
      document.getElementById('main').innerHTML = `
        <div class="banner">
          🍀 <span>와일드카드</span> 대상입니다! 🍀
        </div>
        <div class="container">
          <div class="container_head"><p>내 정보</p></div>
          <div class="frame">
            <img src="../images/profile.jpg" alt="프로필사진">
          </div>
          <div class="vote">
            <div class="vote_button">
              <p>내 투표 현황</p>
              <button>선택</button>
            </div>
          </div>

          <!-- 투표 현황 카드 -->
          <div class="card_container">
            ${makeVoteCard("몬스터")}
            ${makeVoteCard("육개장")}
            ${makeVoteCard("몽쉘")}
          </div>

          <div class="zzim">
            <p>찜목록</p>
          </div>

          <!-- 찜 목록 카드 (같은 스타일) -->
          <div class="card_container">
            ${makeVoteCard("몬스터")}
            ${makeVoteCard("육개장")}
            ${makeVoteCard("초콜릿1")}
            ${makeVoteCard("초콜릿2")}
            ${makeVoteCard("초콜릿3")}
            ${makeVoteCard("초콜릿4")}
            ${makeVoteCard("홈런볼")}
          </div>

          <div class="zzim_button">
            <button>삭제</button>
            <button>변경</button>
          </div>
        </div>
      `;
    }

    function makeVoteCard(name) {
      return `
        <div class="vote_container">
          <div class="vote_frame">
            <img src="../images/${name}.png" alt="${name}">
            <div class="heart-btn" onclick="toggleHeart(this)">♡</div>
          </div>
          <div class="vote_explain">
            <div class="vote_product_name"><p>${name}</p></div>
            <div class="vote_product_explain"><p>#과자 #음료</p></div>
          </div>
        </div>
      `;
    }
    function toggleHeart(el) {
        el.textContent = el.textContent === "♡" ? "♥" : "♡";
    }

    window.onload = showInfo;
  </script>
</body>
</html>
