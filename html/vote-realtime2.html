    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- 전체 팝업창 -->
    <div class="main">
      <div class="title">투표 실시간</div>
      <div class="timer">
        <i class="fa-regular fa-clock"></i>
        <div>D-0</div>
        <div>00:05:13</div>
      </div>
      <div class="status_main">
        <div class="status">
          <div class="status_title">
            <label>과자 투표 현황</label>
          </div>

          <div class="status_list">
            <div class="item">
              <div>
                <i class="fa-regular fa-thumbs-up"></i>
                <i
                  class="fa-regular fa-thumbs-down"
                  style="margin-right: 10px"
                ></i>
              </div>

              <span>육개장</span>
              <div class="bar">
                <div class="fill" style="width: 85%"></div>
              </div>
            </div>
            <div class="item">
              <div>
                <i class="fa-regular fa-thumbs-up"></i>
                <i
                  class="fa-regular fa-thumbs-down"
                  style="margin-right: 10px"
                ></i>
              </div>
              <span>몽쉘</span>
              <div class="bar">
                <div class="fill" style="width: 80%"></div>
              </div>
            </div>
            <div class="item">
              <div>
                <i class="fa-regular fa-thumbs-up"></i>
                <i
                  class="fa-regular fa-thumbs-down"
                  style="margin-right: 10px"
                ></i>
              </div>
              <span>사브레</span>
              <div class="bar">
                <div class="fill" style="width: 70%"></div>
              </div>
            </div>
            <div class="item">
              <div>
                <i class="fa-regular fa-thumbs-up"></i>
                <i
                  class="fa-regular fa-thumbs-down"
                  style="margin-right: 10px"
                ></i>
              </div>
              <span>예감</span>
              <div class="bar">
                <div class="fill" style="width: 50%"></div>
              </div>
            </div>
            <div class="item">
              <div>
                <i class="fa-regular fa-thumbs-up"></i>
                <i
                  class="fa-regular fa-thumbs-down"
                  style="margin-right: 10px"
                ></i>
              </div>
              <span>비쵸비</span>
              <div class="bar">
                <div class="fill" style="width: 40%"></div>
              </div>
            </div>
            <div class="item">
              <div>
                <i class="fa-regular fa-thumbs-up"></i>
                <i
                  class="fa-regular fa-thumbs-down"
                  style="margin-right: 10px"
                ></i>
              </div>
              <span>니!</span>
              <div class="bar">
                <div class="fill" style="width: 30%"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="status_main">
        <div class="status">
          <div class="status_title">
            <label>음료수 투표 현황</label>
          </div>

          <div class="status_list">
            <div class="item">
              <div>
                <i class="fa-regular fa-thumbs-up"></i>
                <i
                  class="fa-regular fa-thumbs-down"
                  style="margin-right: 10px"
                ></i>
              </div>
              <span>몬스터</span>
              <div class="bar">
                <div class="fill" style="width: 85%"></div>
              </div>
            </div>
            <div class="item">
              <div>
                <i class="fa-regular fa-thumbs-up"></i>
                <i
                  class="fa-regular fa-thumbs-down"
                  style="margin-right: 10px"
                ></i>
              </div>
              <span>더킹</span>
              <div class="bar">
                <div class="fill" style="width: 80%"></div>
              </div>
            </div>
            <div class="item">
              <div>
                <i class="fa-regular fa-thumbs-up"></i>
                <i
                  class="fa-regular fa-thumbs-down"
                  style="margin-right: 10px"
                ></i>
              </div>
              <span>피크닉</span>
              <div class="bar">
                <div class="fill" style="width: 70%"></div>
              </div>
            </div>
            <div class="item">
              <div>
                <i class="fa-regular fa-thumbs-up"></i>
                <i
                  class="fa-regular fa-thumbs-down"
                  style="margin-right: 10px"
                ></i>
              </div>
              <span>솔의눈</span>
              <div class="bar">
                <div class="fill" style="width: 50%"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <a class="close" href="/index.html">X</a>
  </body>
</html>
