<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>와일드카드</title>
    <style>
      
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }
      body > div {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 1440px;
      }
      .search-container {
        width: 500px;
        margin: 50px auto;
        display: flex;
        border: 1px solid #ccc;
        border-radius: 25px;
        overflow: hidden;
      }

      .search-input {
        flex: 1;
        padding: 10px 15px;
        border: none;
        outline: none;
        font-size: 16px;
      }

      .search-button {
        color: rgb(0, 0, 0);
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        font-size: 16px;
      }

      .search-button:hover {
        background-color: #45a049;
      }
      .photo {
        width: 150px;
        height: 150px;
        margin-top: 10px;
        margin-left: 10px;
      }

      .list {
        display: flex;
        justify-content: space-evenly;
        align-items: center;
      }

      .button {
        height: 25px;
      }

      .tap {
        border-radius: 20px;
        max-width: 1440px;
        height: 850px;
        background-color: black;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .underline {
        display: flex;
        justify-content: center;
        border-bottom: 1px solid #fff;
        width: 300px;
      }

      .card {
        font-size: 30px;
        display: flex;
        justify-content: center;
      }

      .text {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .title {
        font-size: 25px;
      }

      .content {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div class="tap">
      <!--상단-->
      <!-- 'X'만들기 -->
      <div class="text">
        <div class="card">와일드 카드</div>
        <div class="underline">
          먹고 싶었지만 투표에서 밀려났던 부식!<br />오늘이 기회입니다!
          선택해주세요!
        </div>
      </div>

      <!--검색창-->
      <!-- 검색하면 화면 이동 -->
      <div class="search-container">
        <input type="text" class="search-input" />
        <button class="search-button">검색</button>
      </div>

      <!--나의 찜 목록-->
      <!--'담기'누르면 그 상품은 관리자 페이지 '투표 결과창'에서 확인-->
      <div>
        <div class="title">나의 찜 목록</div>
        <div class="content">
          <div>
            <div>
              <img class="photo" src="/images/몽쉘.png" />
            </div>
            <div class="list">
              <div>상품명<br />#과자#초콜렛</div>
              <button class="button">담기</button>
            </div>
          </div>
          <div>
            <div>
              <img class="photo" src="/images/오레오.jpeg" />
            </div>
            <div class="list">
              <div>상품명<br />#과자#초콜렛</div>
              <button class="button">담기</button>
            </div>
          </div>
          <div>
            <div>
              <img class="photo" src="/images/초콜릿1.jpeg" />
            </div>
            <div class="list">
              <div>상품명<br />#과자#초콜렛</div>
              <button class="button">담기</button>
            </div>
          </div>
          <div>
            <div>
              <img class="photo" src="/images/초콜릿2.jpeg" />
            </div>
            <div class="list">
              <div>상품명<br />#과자#초콜렛</div>
              <button class="button">담기</button>
            </div>
          </div>
        </div>
      </div>

      <!--이전 주 BEST 목록-->

      <div>
        <div class="title" style="margin-top: 70px">이전 주 BEST 목록</div>
        <div class="content">
          <div>
            <div>
              <img class="photo" src="/images/초콜릿3.jpeg" />
            </div>
            <div class="list">
              <div>상품명<br />#과자#초콜렛</div>
              <button class="button">담기</button>
            </div>
          </div>
          <div>
            <div>
              <img class="photo" src="/images/몬스터.png" />
            </div>
            <div class="list">
              <div>상품명<br />#과자#초콜렛</div>
              <button class="button">담기</button>
            </div>
          </div>
          <div>
            <div>
              <img class="photo" src="/images/예감.jpeg" />
            </div>
            <div class="list">
              <div>상품명<br />#과자#초콜렛</div>
              <button class="button">담기</button>
            </div>
          </div>
          <div>
            <div>
              <img class="photo" src="/images/육개장.png" />
            </div>
            <div class="list">
              <div>상품명<br />#과자#초콜렛</div>
              <button class="button">담기</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
